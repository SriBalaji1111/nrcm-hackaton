name: Build Android APK

on:
  push:
    branches:
      - main
      - copilot/build-android-apk
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'online-voting-system/frontend/package-lock.json'

      - name: Install Dependencies & Build Next.js
        working-directory: ./online-voting-system/frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        working-directory: ./online-voting-system/frontend
        run: |
          npx cap sync android

      - name: Build Android APK
        working-directory: ./online-voting-system/frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: online-voting-system/frontend/android/app/build/outputs/apk/debug/app-debug.apk
