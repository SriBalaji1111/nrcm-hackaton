name: Build Android APK

on:
  push:
    branches: [main, dev]
    paths:
      - 'online-voting-system/mobile/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'online-voting-system/mobile/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: online-voting-system/mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: online-voting-system/mobile
        run: npm install

      - name: Install Expo CLI and EAS CLI
        run: npm install -g expo-cli eas-cli

      - name: Generate native Android project
        working-directory: online-voting-system/mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make Gradlew executable
        working-directory: online-voting-system/mobile/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: online-voting-system/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: online-voting-system/mobile/android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
